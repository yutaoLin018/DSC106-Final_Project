<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>The Greening Earth</title>

  <!-- Preload only the startup / likely next files -->
  <link
    rel="preload"
    href="data/actual_ndvi_spikes_2025_low.json"
    as="fetch"
    crossorigin="anonymous"
  />

  <link
    rel="preload"
    href="data/actual_ndvi_spikes_2000_low.json"
    as="fetch"
    crossorigin="anonymous"
  />

  <link
    href="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body class="mode-present">
  <header class="top-ui">
    <div class="brand">
      <strong>The Greening Earth</strong>
      <span>About this Project</span>
    </div>

    <nav class="compare-tabs">
      <button class="compare-tab" data-mode="compare">
        Compare
        <small>2000 / 2013 vs. 2025</small>
      </button>

      <button class="compare-tab selected" data-mode="present">
        Vegetation 2025
        <small>Latest MODIS NDVI layer</small>
      </button>

      <button class="compare-tab" data-mode="change">
        Show change, 2000–2025
        <small>
          <span class="decline-dot">■</span> Vegetation decline&nbsp;&nbsp;
          <span class="growth-dot">■</span> Vegetation growth
        </small>
      </button>
    </nav>

    <div class="region-jump">
      <label for="region-select">Jump to</label>
      <select id="region-select">
        <option value="global">Global Overview</option>
        <option value="amazon">Amazon Basin</option>
        <option value="sahel">Sahel / West Africa</option>
        <option value="china">Northern China / Inner Mongolia</option>
      </select>
    </div>
  </header>

  <main class="map-stage">
    <div id="single-map" class="map-view"></div>

    <div id="compare-view">
      <div id="left-map" class="compare-map"></div>
      <div id="right-map" class="compare-map"></div>

      <div class="split-line"></div>

      <div class="compare-switch">
        <div class="compare-year-stack">
          <button class="compare-year-option selected" data-compare-year="2000">
            2000
          </button>
          <button class="compare-year-option" data-compare-year="2013">
            2013
          </button>
        </div>

        <span class="compare-current-year">2025</span>
      </div>
    </div>

    <section class="story-panel">
      <h2 id="story-title">Global Vegetation Change</h2>
      <p id="story-text">
        Explore where Earth has become greener or less green using MODIS NDVI
        satellite data. Spike height shows vegetation intensity or change,
        while color separates growth from decline.
      </p>
    </section>
  </main>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.js"></script>
  <script src="main.js"></script>
</body>
</html>
