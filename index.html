<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>The Greening Earth</title>

  <link
    href="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body class="mode-present">
  <header class="top-ui">
    <div class="brand">
      <strong>The Greening Earth</strong>
      <span>About this Project</span>
    </div>

    <nav class="compare-tabs">
      <button class="compare-tab" data-mode="compare">
        Compare to 2000
      </button>

      <button class="compare-tab selected" data-mode="present">
        Vegetation 2025
        <small>Latest prototype layer</small>
      </button>

      <button class="compare-tab" data-mode="change">
        Show change, 2000–2025
        <small>
          <span class="decline-dot">■</span> Decline vs.
          <span class="growth-dot">■</span> Growth
        </small>
      </button>
    </nav>

    <div class="region-jump">
      <label for="region-select">Jump to</label>
      <select id="region-select">
        <option value="global">Global Overview</option>
        <option value="amazon">Amazon Basin</option>
        <option value="sahel">Sahel / West Africa</option>
        <option value="china">Northern China / Inner Mongolia</option>
      </select>
    </div>
  </header>

  <main class="map-stage">
    <div id="single-map" class="map-view"></div>

    <div id="compare-view">
      <div id="left-map" class="compare-map"></div>
      <div id="right-map" class="compare-map"></div>

      <div class="split-line"></div>

      <div class="year-labels">
        <span>2000</span>
        <span>2025</span>
      </div>
    </div>

    <section class="story-panel">
      <h2 id="story-title">Global Overview</h2>
      <p id="story-text">
        Placeholder text: introduce the overall story and the main question here.
      </p>
    </section>
  </main>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.js"></script>
  <script src="main.js"></script>
</body>
</html>
